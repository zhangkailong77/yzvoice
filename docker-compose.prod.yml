services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: voice-backend
    restart: unless-stopped
    env_file:
      - backend/.env.production
    volumes:
      - temp_audio_data:/app/temp_audio
    networks:
      - voice-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_ORIGIN: http://112.124.32.196
    container_name: voice-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - voice-net

volumes:
  temp_audio_data:

networks:
  voice-net:
    driver: bridge
