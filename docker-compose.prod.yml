services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: voice-backend
    restart: unless-stopped
    env_file:
      - backend/.env.production
    volumes:
      - temp_audio_data:/app/temp_audio
    networks:
      - voice-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-https://lipsync.ybystds.com:4006}
    container_name: voice-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4006:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
    networks:
      - voice-net

volumes:
  temp_audio_data:

networks:
  voice-net:
    driver: bridge
